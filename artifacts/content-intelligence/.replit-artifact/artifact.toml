kind = "web"
previewPath = "/"
title = "Content Intelligence System"
version = "1.0.0"
id = "artifacts/content-intelligence"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21795

[services.development]
run = "pnpm --filter @workspace/content-intelligence run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/content-intelligence", "run", "build" ]
publicDir = "artifacts/content-intelligence/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21795"
BASE_PATH = "/"
